name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build noTunes (Release, unsigned)
        run: |
          xcodebuild \
            -project noTunes.xcodeproj \
            -scheme noTunes \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned app
        run: |
          mkdir -p dist
          ZIP_NAME="noTunesMute.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/Build/Products/Release/noTunes.app" "dist/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: noTunesMute-${{ github.ref_name }}
          path: dist/*.zip

      - name: Create GitHub Release and upload zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          body: |
            Unsigned macOS build of noTunesMute.

            Installation:
            1. Download and unzip `${{ env.ZIP_NAME }}`
            2. Drag `noTunes.app` to `/Applications`
            3. Right-click `noTunes.app` and choose `Open`
            4. Click `Open` in the warning dialog

            If macOS still blocks launch:
            1. Open System Settings -> Privacy & Security
            2. Click `Open Anyway` for noTunes
            3. Re-open the app and confirm

            Terminal fallback:
            ```bash
            xattr -dr com.apple.quarantine /Applications/noTunes.app
            open /Applications/noTunes.app
            ```
