name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build noTunes (Release)
        run: |
          xcodebuild \
            -project noTunes.xcodeproj \
            -scheme noTunes \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          mkdir -p dist
          ZIP_NAME="noTunes-${GITHUB_REF_NAME}.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/Build/Products/Release/noTunes.app" "dist/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: noTunes-${{ github.ref_name }}
          path: dist/*.zip

      - name: Create GitHub Release and upload zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
